<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub issue tracker</title>
  <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
  <!-- DaisyUI + Tailwind CSS CDN  -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- css connected -->
  <link rel="stylesheet" href="./style/pro.css">
  <!-- font awesome cdn -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <!-- google font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
</head>

<body>
  <header id="login-section" class="w-11/12 sm:w-3/4 md:w-1/2 lg:w-1/3 mx-auto mt-10 sm:mt-16 md:mt-20">
    <!-- logo & title -->
    <div class="flex flex-col items-center gap-2">
      <img class="w-12 sm:w-14 md:w-16" src="./assets/github-logo.png" alt="GitHub Logo">
      <h2 class="font-semibold text-xl sm:text-2xl text-center">GitHub Issues Tracker</h2>
      <p class="text-gray-500 text-sm sm:text-base text-center">Sign in to manage your issues</p>
    </div>
    <!-- Input Fields -->
    <div class="flex flex-col md:items-center gap-4 my-5">
      <div class="space-y-2">
        <h2 class="text-sm sm:text-base font-medium">Username</h2>
        <input id="input-username"
          class="w-full md:w-95 py-2 border border-gray-300 rounded-md pl-3 text-sm sm:text-base focus:outline-none focus:border-blue-500"
          type="text" placeholder="Enter UserName">
        <p class="text-blue-600 text-xs sm:text-sm">Default: admin</p>
      </div>
      <div class="space-y-2">
        <h2 class="text-sm sm:text-base font-medium">Password</h2>
        <input id="input-password"
          class="w-full md:w-95 py-2 border border-gray-300 rounded-md pl-3 text-sm sm:text-base focus:outline-none focus:border-blue-500"
          type="password" placeholder="Enter Password">
        <p class="text-blue-600 text-xs sm:text-sm">Default: admin123</p>
      </div>
    </div>
    <!-- Button & Demo Credentials -->
    <div class="flex flex-col items-center space-y-3">
      <button id="login-btn" class="btn btn-primary w-full md:w-95 text-sm sm:text-base">Sign In</button>
      <h2 class="text-sm text-gray-400">OR</h2>
      <p class="text-gray-400 text-xs sm:text-sm">Demo Credentials</p>
      <div class="text-center mt-1">
        <h2 class="font-semibold text-sm sm:text-base">Username: <span class="font-normal text-gray-500">admin</span>
        </h2>
        <h2 class="font-semibold text-sm sm:text-base">Password: <span class="font-normal text-gray-500">admin123</span>
        </h2>
      </div>
    </div>
  </header>
  <!-- hero section start from here -->
  <main id="main-section" class="hidden">
    <!-- navbar start from here -->
    <section>
      <div class="navbar bg-base-100 shadow-sm">
        <!-- Logo & Title -->
        <div class="left-side flex-1 gap-2 md:ml-10">
          <div class="flex items-center gap-2">
            <img class="w-7 sm:w-9 cursor-pointer" src="./assets/github-logo.png" alt="GitHub Logo">
            <a class="text-sm sm:text-base md:text-xl font-bold">GitHub Issues Tracker</a>
          </div>
        </div>

        <!-- Search & Button -->
        <div class="right-side flex gap-2 md:mr-10">
          <input id="search-input" type="text" placeholder="Search"
            class="input input-bordered w-20 sm:w-32 md:w-auto text-sm md:mr-10" />
          <button class="btn btn-primary">
            <i class="fa-solid fa-plus"></i>
            <span class="hidden sm:inline">NEW ISSUE</span>
          </button>
        </div>

      </div>
    </section>
    <!-- category buttons are start from here -->
    <section class="w-11/12 mx-auto my-14 flex gap-3">
      <button id="all-btn" onclick="allBtn()" class="btn btn-primary">ALL</button>
      <button id="open-btn" onclick="openBtn()" class="btn btn-outline">OPEN</button>
      <button id="closed-btn" onclick="closedBtn()" class="btn btn-outline">CLOSED</button>
    </section>
    <!-- issues Track and manage section start from here -->
    <section class="w-11/12 mx-auto flex justify-between gap-4">

      <!-- Left: Icon & Title -->
      <div class="flex gap-3 items-center">
        <div class="bg-purple-200 p-2 rounded-full">
          <img class="sm:w-13 md:w-10" src="./assets/Aperture.png" alt="">
        </div>
        <div>
          <h2 class="font-bold text-xl sm:text-2xl"><span id="issue-count">0</span> Issues</h2>
          <p class="text-gray-500 text-sm sm:text-base">Track and manage <span class="hidden sm:inline">your project
              issues</span></p>
        </div>
      </div>

      <!-- Right: Open & Closed -->
      <div class="flex gap-4 sm:gap-5">
        <div class="flex gap-2 items-center">
          <span class="w-3 h-3 sm:w-4 sm:h-4 bg-green-600 rounded-full inline-block"></span>
          <h2 class="font-bold text-base sm:text-xl">OPEN</h2>
        </div>
        <div class="flex gap-2 items-center">
          <span class="w-3 h-3 sm:w-4 sm:h-4 bg-purple-600 rounded-full inline-block"></span>
          <h2 class="font-bold text-base sm:text-xl">CLOSED</h2>
        </div>
      </div>

    </section>
    <hr class="my-14 border-x-1 border-gray-300">
    <section id="spinner" class="flex justify-center items-center py-10 hidden">
      <span class="loading loading-bars loading-xl"></span>
    </section>
    <!-- card section start from here -->
    <section class="w-11/12 mx-auto mb-14">
      <div id="main-cards" class="grid grid-cols-1 md:grid-cols-4 gap-x-8 gap-y-14">
      </div>
    </section>
    <!-- modal section start from here -->
    <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
    <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
      <div class="modal-box">
        <div id="details-container" class="space-y-5">

        </div>
        <div class="modal-action">
          <form method="dialog">
            <!-- if there is a button in form, it will close the modal -->
            <button class="btn btn-primary">Close</button>
          </form>
        </div>
      </div>
    </dialog>
  </main>

  <script src="./script/login.js"></script>
  <script src="./script/main.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub issue tracker</title>
  <!-- DaisyUI + Tailwind CSS CDN  -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- css connected -->
   <link rel="stylesheet" href="./style/pro.css">
   <!-- font awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous" referrerpolicy="no-referrer" />
      <!-- google font -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
  <header class="w-11/12 mx-auto mt-20">
    <div class="flex flex-col items-center gap-2">
      <img src="./assets/github-logo.png" alt="">
      <h2 class="font-semibold text-2xl">GitHub Issues Tracker</h2>
      <p class="text-gray-500">Sign in to manage your issues</p>
    </div>

    <div class="flex flex-col items-center gap-2 my-5 space-y-3">
     <div class="space-y-2">
      <h2>Username</h2>
      <input class="w-95 py-2 border-gray-300 rounded-md pl-3" type="text" placeholder="Enter UserName">
      <p class="text-blue-600">Default: admin</p>
     </div>
     <div class="space-y-2">
      <h2>Password</h2>
      <input class="w-95 py-2 border-gray-300 rounded-md pl-3" type="password" placeholder="Enter Password">
      <p class="text-blue-600">Default: admin123</p>
     </div>
    </div>

    <div class="flex flex-col items-center space-y-3">
      <button id="login-btn" class="btn btn-primary w-95">Sign In</button>
      <h2>OR</h2>
      <p class="text-gray-400">Demo Credentials</p>

      <div class="text-center mt-3">
        <h2 class="font-semibold">Username: <span class="font-normal text-gray-500">admin</span></h2>

        <h2 class="font-semibold">Password: <span class="font-normal text-gray-500">admin123</span></h2>
      </div>
    </div>
  </header>





  <script src="./script/project.js"></script>
</body>
</html>
